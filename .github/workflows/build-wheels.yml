name: Build Wheels

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: build-wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs_on: ubuntu-24.04
            package_resource_name: trace_processor_shell
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            package_resource_name: trace_processor_shell
          - name: windows-amd64
            runs_on: windows-2025
            package_resource_name: trace_processor_shell.exe
          - name: macos-x86_64
            runs_on: macos-15-intel
            package_resource_name: trace_processor_shell
          - name: macos-arm64
            runs_on: macos-15
            package_resource_name: trace_processor_shell

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Download trace_processor_shell for this runner
        run: python scripts/download_trace_processor_shell.py --clean

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel contents
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}: {wheels}")

          wheel = wheels[0]
          expected_resource = "msprof_mcp/resources/perfetto/${{ matrix.package_resource_name }}"

          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())

          if expected_resource not in names:
              raise SystemExit(
                  f"Missing bundled resource {expected_resource} in {wheel.name}"
              )

          unexpected_resources = sorted(
              name
              for name in names
              if name.startswith("msprof_mcp/resources/perfetto/trace_processor_shell-")
          )
          if unexpected_resources:
              raise SystemExit(
                  f"Wheel should not contain source-only resource names: {unexpected_resources}"
              )

          print(f"Verified {wheel.name}")
          print(f"Bundled resource: {expected_resource}")
          PY

      - name: List built files
        run: ls -lh dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

  bundle-artifacts:
    name: bundle-all-wheels
    runs-on: ubuntu-24.04
    needs: build-wheel

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Show bundled wheels
        run: ls -lh dist

      - name: Upload combined wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-all
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14
