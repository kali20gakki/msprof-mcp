name: Publish Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Validate tag matches package version
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{version}"

          if tag != expected_tag:
              raise SystemExit(
                  f"Git tag {tag!r} does not match project version {version!r}. "
                  f"Expected tag: {expected_tag!r}"
              )

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")

          print(f"Validated tag {tag} for project version {version}")
          PY

  build-wheels:
    name: build-wheels
    needs: validate-tag
    permissions:
      contents: read
    uses: ./.github/workflows/build-wheels.yml

  build-sdist:
    name: build-sdist
    needs: validate-tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Download all bundled trace_processor_shell artifacts
        run: python scripts/download_trace_processor_shell.py --all --clean

      - name: Build source distribution
        run: python -m build --sdist

      - name: List built files
        run: ls -lh dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish-github-release:
    name: publish-github-release
    needs:
      - validate-tag
      - build-wheels
      - build-sdist
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-all
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Show release artifacts
        run: ls -lh dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          prerelease_flag=()
          if [[ "${tag}" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${tag}" \
              --generate-notes \
              "${prerelease_flag[@]}"
          fi

  publish-pypi:
    name: publish-pypi
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    needs:
      - validate-tag
      - build-wheels
      - build-sdist
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/msprof-mcp
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-all
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Show PyPI artifacts
        run: ls -lh dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
